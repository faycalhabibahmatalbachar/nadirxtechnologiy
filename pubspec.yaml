name: nadirx_technologie
description: "Application d'inscription NADIRX TECHNOLOGIE — Formation Cybersécurité"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Firebase / Notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^17.1.2

  # UI Cyber
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  phosphor_flutter: ^2.1.0

  # Photo / Upload
  image_picker: ^1.1.2
  image_cropper: ^12.1.0
  file_picker: ^8.0.3
  cached_network_image: ^3.3.1

  # Utilitaires
  intl: ^0.20.2
  uuid: ^4.4.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  universal_io: ^2.2.2

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  very_good_analysis: ^6.0.0
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
  image_path: assets/images/icon.png

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/animations/
    - assets/images/
